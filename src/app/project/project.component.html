<header class="prj-head" [ngStyle]="{'background-image': 'url(' + project.background + ')'}">
  <div class="container">
    <div class="row">
      <div class="col-lg-8 text-container">
        <h1 class="text-uppercase text-white"><strong>{{ project.title }}</strong></h1>
        <p class="sub-title text-faded light">{{ project.type }}</p>
      </div>
    </div>
  </div>
</header>

<section class="bg-grad-1 round-top">
  <div class="container">
    <div class="row">
      <div class="col-10 mx-auto my-2">
        <p class="">{{ project.description }}</p>
      </div>
    </div>
    <div class="row">
      <div class="col-10 mx-auto">
        <h2>More Work</h2>
      </div>
    </div>
    <app-projects></app-projects>
  </div>
</section>
