<header class="masthead text-center text-white d-flex">
  <div class="over"> </div>
  <img src="assets/img/full/{{ resource.link }}.jpg" alt="{{ resource.title }}">
  <div class="container my-auto">
    <div class="row">
      <div class="col-lg-10 mx-auto">
        <h1 class="text-uppercase">
          <strong>{{ resource.title }}</strong>
        </h1>
        <p class="text-faded text-uppercase mb-1">{{ resource.type }}</p>
        <hr class="light">
      </div>
      <div class="col-lg-8 mx-auto">
        <p class="text-faded mb-5">{{ resource.date }}</p>
      </div>
      <div class="down-wrap">
        <a class="down-inner js-scroll-trigger" href="#main"><i class="fa fa-chevron-down" aria-hidden="true"></i></a>
      </div>
    </div>
  </div>
</header>

<section id="article">
  <div class="container">
    <div class="row">
      <div class="col-lg-10 mx-auto" *ngFor="let b of resource.body">
        <p *ngIf="b[0]!='hr'" [ngClass]="{'quote': b[0]==='q'}">{{ b[1] }}</p>
        <hr *ngIf="b[0]==='hr'">
      </div>
    </div>
  </div>
</section>

<!-- Ending Detail Section -->
<section class="bg-primary" id="about">
  <div class="container">
    <div class="row">
      <div class="col-lg-8 mx-auto text-center">
        <h2 class="section-heading text-white">Our Purpose</h2>
        <hr class="light my-4">
        <p class="text-faded mb-4">{{ description }}</p>
      </div>
    </div>
  </div>
</section>

<section id="contact">
  <div class="container">
    <div class="row">
      <div class="col-lg-8 mx-auto text-center">
        <h2 class="section-heading">Let's Get In Touch!</h2>
        <hr class="my-4">
        <p class="mb-5">Have feedback on some content? Maybe a question related to a resource? Send me an email and I will get back to you as soon as possible!</p>
      </div>
    </div>
    <div class="row">
      <div class="col-lg-4 mx-auto text-center">
        <i class="fa fa-envelope-o fa-3x mb-3 sr-contact"></i>
        <p>
          <a href="mailto:{{ email }}">{{ email }}</a>
        </p>
      </div>
    </div>
  </div>
</section>
